# Project-scoped Codex config for a trusted React + TypeScript + pnpm repository.

model = "gpt-5.4"
model_reasoning_effort = "high"
personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "disabled"

project_root_markers = [
  ".git",
  "pnpm-workspace.yaml",
  "package.json",
  "tsconfig.json",
  "vite.config.ts",
  "next.config.js",
]

[sandbox_workspace_write]
network_access = false

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only codebase discovery for unfamiliar React and TypeScript areas."
config_file = "../agents/explorer.toml"

[agents.planner]
description = "Read-only planner that turns findings into a safe implementation plan."
config_file = "../agents/planner.toml"

[agents.implementer]
description = "Workspace-write agent for minimal, production-safe React changes."
config_file = "../agents/implementer.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, accessibility, and missing tests."
config_file = "../agents/reviewer.toml"

[agents.unit_test_writer]
description = "Workspace-write test specialist for focused RTL + Vitest/Jest coverage."
config_file = "../agents/unit-test-writer.toml"

[agents.browser_debugger]
description = "Workspace-write browser investigator that gathers UI, console, and network evidence without changing app code."
config_file = "../agents/browser-debugger.toml"
